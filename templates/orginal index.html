<!DOCTYPE html>
<html>
<head>
    <title>IFFAI AI Avatar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 20px;
        }

        #chatbox {
            width: 60%;
            height: 400px;
            margin: 20px auto;
            background: #111827;
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            text-align: left;
        }

        .user {
            color: #38bdf8;
            margin: 10px 0;
        }

        .assistant {
            color: #22c55e;
            margin: 10px 0;
        }

        button {
            padding: 12px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        #startBtn {
            background-color: #22c55e;
            color: white;
        }

        #endBtn {
            background-color: #ef4444;
            color: white;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
            color: #facc15;
        }
    </style>
</head>
<body>

<h1>IFFAI AI Avatar</h1>

<div id="chatbox"></div>

<button id="startBtn" onclick="startConversation()">Start Conversation</button>
<button id="endBtn" onclick="endConversation()">End Conversation</button>

<div id="status">Status: Idle</div>

<script>

let recognition;
let isListening = false;
let isSpeaking = false;   // 👈 ADD THIS

function initSpeech() {

    recognition = new webkitSpeechRecognition();

    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = "en-US";

    recognition.onresult = async function(event) {

        const last = event.results.length - 1;
        const text = event.results[last][0].transcript;

        addMessage("You: " + text, "user");

        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: text})
        });

        const data = await response.json();

        addMessage("IFFAI Avatar: " + data.reply, "assistant");

        speak(data.reply);
    };

    recognition.onend = function () {

        // Restart only if NOT speaking
        if (isListening && !speechSynthesis.speaking) {
            recognition.start();
        }
    };

}

function startConversation() {

    if (!recognition) {
        initSpeech();
    }

    isListening = true;

    recognition.start();

    document.getElementById("status").innerText = "Status: Listening...";
}

function endConversation() {

    isListening = false;
    isSpeaking = false;

    // Stop mic
    if (recognition) {
        recognition.stop();
    }

    // 🔥 Stop AI voice immediately
    if (speechSynthesis.speaking) {
        speechSynthesis.cancel();
    }

    document.getElementById("status").innerText = "Status: Stopped";
}

function addMessage(text, className) {

    const chatbox = document.getElementById("chatbox");

    const div = document.createElement("div");
    div.className = className;
    div.innerText = text;

    chatbox.appendChild(div);

    chatbox.scrollTop = chatbox.scrollHeight;
}

function speak(text) {

    if (!text) return;

    // Stop mic before speaking
    if (recognition && isListening) {
        recognition.stop();
    }

    isSpeaking = true;

    const speech = new SpeechSynthesisUtterance(text);

    speech.lang = "en-US";
    speech.rate = 0.95;
    speech.pitch = 1;

    speech.onstart = function () {
        document.getElementById("status").innerText = "Status: Speaking...";
    };

    speech.onend = function () {

        isSpeaking = false;

        document.getElementById("status").innerText = "Status: Listening...";

        // Restart mic safely after speaking
        if (isListening) {
            setTimeout(() => {
                recognition.start();
            }, 300); // small delay for safety
        }
    };

    speechSynthesis.speak(speech);
}

</script>

</body>
</html>
