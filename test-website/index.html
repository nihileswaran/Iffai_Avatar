<!DOCTYPE html>
<html>
<head>
    <title>Test Website with Chatbot</title>
</head>
<body>

<h1>My Test Website</h1>

<p>This is a simple website to test the chatbot widget.</p>

<p>Click the chat button at bottom right.</p>


<!-- Chat button -->
<div id="chatButton" onclick="toggleChat()"
style="
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#007bff;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
z-index:9999;
">
💬
</div>


<!-- Chat iframe -->
<div id="chatFrame"
style="
position:fixed;
bottom:90px;
right:20px;
width:350px;
height:500px;
display:none;
z-index:9999;
">

<iframe
src="http://127.0.0.1:5000/"
style="
width:100%;
height:100%;
border:none;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
">
</iframe>

</div>


<script id="j8r6nn">

function toggleChat(){

    var frame = document.getElementById("chatFrame");

    if(frame.style.display == "none")
        frame.style.display = "block";
    else
        frame.style.display = "none";
}

</script>


</body>
</html>
